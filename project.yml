# XcodeGen spec — run: xcodegen generate (install via: brew install xcodegen)
name: PhotosCleanup
options:
  # Re-link CocoaPods after every generate (xcodegen wipes Pods integration otherwise).
  postGenCommand: pod install
  bundleIdPrefix: com.whio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  useBaseInternationalization: true
settings:
  base:
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES
packages: {}
schemes:
  PhotosCleanup:
    build:
      targets:
        PhotosCleanup: all
    run:
      config: Debug
      # XcodeGen emits a 2-segment relative path; Xcode resolves the .storekit from xcschemes only with ../../../ — fix in PhotosCleanup.xcscheme after `xcodegen generate` if the StoreKit file warning returns.
      storeKitConfiguration: PhotosCleanup/Configuration/Products.storekit

targets:
  PhotosCleanup:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotosCleanup
        name: PhotosCleanup
        excludes:
          - "**/Preview Content/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whio.photoscleanup.app
        INFOPLIST_FILE: PhotosCleanup/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "PhotoSweep"
        # Required by Google Mobile Ads SDK at launch (sample ID for dev; replace with your AdMob App ID for release).
        INFOPLIST_KEY_GADApplicationIdentifier: "ca-app-pub-4048960606079471~6159396073"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PhotoSweep needs access to your photo library to find duplicates, group similar photos, and suggest the best shot in each group. All analysis runs on your device."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "PhotoSweep moves photos you choose to Recently Deleted so you can undo from the Photos app."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # `complete` flags many third-party SDK patterns; `targeted` keeps real issues without AdMob/Unity noise.
        SWIFT_STRICT_CONCURRENCY: targeted
    dependencies: []
    info:
      path: PhotosCleanup/Info.plist
      properties:
        # Required at runtime by Google Mobile Ads (must also appear in Info.plist on disk for reliable builds).
        GADApplicationIdentifier: "ca-app-pub-4048960606079471~6159396073"
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: "PhotoSweep needs access to your photo library to find duplicates, group similar photos, and suggest the best shot. All processing is done on your device."
        NSPhotoLibraryAddUsageDescription: "PhotoSweep moves photos you choose to Recently Deleted so you can undo from the Photos app."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
